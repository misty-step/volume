# Volume project-level Codex config.
#
# Cross-harness parity: the canonical skill root for this repo is
# `.agents/skills/` (see .spellbook/repo-brief.md). `.claude/skills/` is a
# symlink bridge to that same directory; Codex should discover the same
# 23 tailored skills (universal / workflow / domain-invented) from there.
#
# Per-harness settings merge additively — user-added entries in this file
# (or in ~/.codex/config.toml) survive future /tailor runs. Only the
# entries /tailor derived from the current skill set are its contribution.

[features]
codex_hooks = true
child_agents_md = true

# Volume skill bench. Paths are absolute because Codex global config
# uses absolute paths for [[skills.config]] entries; re-running /tailor
# regenerates this list from the current contents of .agents/skills/.
[[skills.config]]
path = "/Users/phaedrus/Development/volume/.agents/skills/a11y/SKILL.md"
enabled = true

