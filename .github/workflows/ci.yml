name: Quality Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  merge-gate:
    name: merge-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Run canonical Dagger CI pipeline
        id: dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.20.3"
          call: check --source=.
          enable-github-summary: "true"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Publish merge-gate status on PR head
        if: ${{ github.event_name == 'pull_request' && always() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DAGGER_OUTCOME: ${{ steps.dagger.outcome }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          state="error"
          description="Dagger merge-gate did not complete."

          case "$DAGGER_OUTCOME" in
            success)
              state="success"
              description="Dagger merge-gate passed on PR head."
              ;;
            failure)
              state="failure"
              description="Dagger merge-gate failed on PR head."
              ;;
            cancelled)
              description="Dagger merge-gate was cancelled."
              ;;
          esac

          gh api "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -X POST \
            -f state="${state}" \
            -f context="merge-gate" \
            -f description="${description}" \
            -f target_url="${RUN_URL}"
