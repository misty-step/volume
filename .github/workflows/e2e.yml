name: E2E Tests

on:
  pull_request:
    branches: [master]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    env:
      # App + Clerk credentials (set in GitHub Secrets)
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
      CLERK_TEST_USER_EMAIL: ${{ secrets.CLERK_TEST_USER_EMAIL }}
      CLERK_TEST_USER_PASSWORD: ${{ secrets.CLERK_TEST_USER_PASSWORD }}
      # Convex
      NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
      # Test reset
      TEST_RESET_SECRET: ${{ secrets.TEST_RESET_SECRET }}

    steps:
      - name: Validate required E2E secrets
        run: |
          missing=()
          required=(
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            CLERK_JWT_ISSUER_DOMAIN
            CLERK_TEST_USER_EMAIL
            CLERK_TEST_USER_PASSWORD
            NEXT_PUBLIC_CONVEX_URL
            TEST_RESET_SECRET
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Missing E2E configuration::GitHub Actions is missing required secrets for Playwright E2E."
            printf 'Missing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
