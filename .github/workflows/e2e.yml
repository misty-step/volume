name: E2E Tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-flight runs for the same PR — only the latest push matters
concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
  CLERK_TEST_USER_EMAIL: ${{ secrets.CLERK_TEST_USER_EMAIL }}
  CLERK_TEST_USER_PASSWORD: ${{ secrets.CLERK_TEST_USER_PASSWORD }}
  NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  TEST_RESET_SECRET: ${{ secrets.TEST_RESET_SECRET }}

jobs:
  # ─── Gate: fail immediately if secrets aren't configured ───
  preflight:
    name: Preflight
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 1
    outputs:
      should_run_e2e: ${{ steps.validate.outputs.should_run_e2e }}
    steps:
      - name: Detect bot PRs that cannot access E2E secrets
        id: validate
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ] || [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ] || [ "${{ github.event.pull_request.user.login }}" = "app/dependabot" ]; then
            echo "should_run_e2e=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping E2E lanes::Dependabot pull requests cannot access repository secrets, so Playwright lanes are skipped."
            exit 0
          fi

          echo "should_run_e2e=true" >> "$GITHUB_OUTPUT"

      - name: Validate required E2E secrets
        run: |
          missing=()
          required=(
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            CLERK_JWT_ISSUER_DOMAIN
            CLERK_TEST_USER_EMAIL
            CLERK_TEST_USER_PASSWORD
            NEXT_PUBLIC_CONVEX_URL
            OPENROUTER_API_KEY
            TEST_RESET_SECRET
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Missing E2E configuration::GitHub Actions is missing required secrets for Playwright E2E."
            printf 'Missing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

  # ─── Lane 1: Smoke — fast gate, no auth needed ───
  smoke:
    name: Smoke
    needs: preflight
    if: ${{ needs.preflight.outputs.should_run_e2e == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: Run smoke tests
        run: bunx playwright test e2e/smoke.spec.ts
        env:
          CI: true

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: smoke-traces
          path: test-results/
          retention-days: 7

  # ─── Lane 2: Coach — serial, rate-limit sensitive ───
  coach:
    name: Coach
    needs: preflight
    if: ${{ needs.preflight.outputs.should_run_e2e == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: Run coach tests
        run: bunx playwright test e2e/critical-flow.spec.ts e2e/coach-flows.spec.ts
        env:
          CI: true

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: coach-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: coach-traces
          path: test-results/
          retention-days: 7

  # ─── Lane 3: Flows — subscription, errors, parallelizable ───
  # Runs after coach to avoid shared test-account data races
  # (both lanes call resetAuthenticatedE2EState which wipes user data)
  flows:
    name: Flows
    needs: [preflight, coach]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.preflight.outputs.should_run_e2e == 'true' && needs.coach.result == 'success' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: Run flow tests
        run: bunx playwright test e2e/subscription-flow.spec.ts e2e/error-scenarios.spec.ts
        env:
          CI: true
          PLAYWRIGHT_WORKERS: "2"

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: flows-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: flows-traces
          path: test-results/
          retention-days: 7
