# Lefthook Quality Gates Configuration
# Simple interface, powerful implementation

# Fast, iterative quality checks (sub-second)
pre-commit:
  parallel: true
  commands:
    # === Security Scanning (Critical) ===
    security-scan:
      run: trufflehog git "file://$(git rev-parse --git-common-dir)" --bare --only-verified --fail --no-update
      fail_text: "❌ Secrets detected! Remove before committing."

    # === Code Formatting (Auto-fixable) ===
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,yml,yaml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
      fail_text: "Formatting issues auto-fixed. Review and re-commit."

    # === Code Quality (Auto-fixable) ===
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      exclude: "convex/_generated/**"
      run: bunx eslint --fix --max-warnings=0 {staged_files}
      stage_fixed: true
      fail_text: "Linting issues auto-fixed. Review and re-commit."

    # === Type Safety (Fast Incremental) ===
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
      fail_text: "TypeScript errors found. Fix before committing."

    # === Configuration Validation ===
    validate-config:
      run: bunx tsx scripts/validate-lefthook-config.ts
      fail_text: "❌ Configuration validation failed. Fix issues before committing."

    # === Convex Integration (Project-specific) ===
    convex-warning:
      glob: "convex/**/*.ts"
      run: |
        echo ""
        echo "⚠️  Convex function changes detected"
        echo "   Ensure you've tested with: bun run dev"
        echo "   (runs both Next.js AND Convex)"
        echo ""
      interactive: false

# Commit message standards
commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
      fail_text: "❌ Commit message doesn't follow conventional commit standard."

# Comprehensive quality gates (full verification)
pre-push:
  parallel: true
  commands:
    # === Test Suite (Correctness) ===
    test-suite:
      run: "NODE_ENV=test CI=true bun run test:coverage"
      fail_text: "❌ Test suite failed. Run 'bun run test' for details."

    # === Dependency Audit (Security) ===
    security-audit:
      run: bun run security:audit
      fail_text: "❌ High-severity dependency vulnerabilities detected."

    # === Build Verification (Integration) ===
    # On master, `analyze` runs instead (includes a full build + bundle analysis).
    build-check:
      run: bun run build
      fail_text: "❌ Build failed. Fix build errors before pushing."
      skip:
        - ref: master

    # === Build + Bundle Analysis (master only) ===
    # `analyze` = ANALYZE=true next build — a full build with bundle analysis.
    # Replaces separate build-check on master to avoid .next/lock conflicts.
    build-and-analyze:
      run: bun run analyze
      fail_text: "❌ Build or bundle analysis failed."
      only:
        - ref: master

    # === Production Environment Verification ===
    verify-prod-env:
      run: ./scripts/verify-env.sh --prod-only --quiet
      fail_text: |
        ❌ Production environment variables missing!
        Run './scripts/verify-env.sh --prod-only' for details.
        See CLAUDE.md 'Debugging External Integrations' for fix instructions.
      only:
        - ref: master

# Post-checkout Convex type regeneration
post-checkout:
  commands:
    convex-types:
      run: |
        echo ""
        echo "⚠️  Convex functions changed between branches"
        echo "   Run: bun run dev (or bun run dev:convex)"
        echo "   to sync types and deployment"
        echo ""
      glob: "convex/**/*"
